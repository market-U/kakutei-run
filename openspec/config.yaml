schema: spec-driven

project_settings:
  name: "Kakutei-Run"
  language: "ja"
  tech_stack:
    game_engine: "Phaser 3"
    language: "TypeScript"
    build_tool: "Vite"
    test_framework: "Vitest"
    deploy_target: "Azure Static Web Apps"

generation_rules:
  instructions: |
    - すべての対話は日本語で行ってください。
    - 生成されるコード内のコメント、ドキュメント（JSDoc等）、コミットメッセージはすべて日本語で記述してください。
    - エラーメッセージやログ出力のテキストも日本語をデフォルトとしてください。
    - 生成するすべての Markdown ファイルは markdownlint のルールに準拠してください。
      - MD041: 各ファイルの先頭行は必ずレベル1の見出し（`#`）にしてください。
      - MD040: コードブロックには必ず言語識別子を指定してください（言語不明な場合は `text` を使用）。

git_workflow:
  branch_strategy:
    base_branch: "develop"
  naming:
    change_dir: "issue-<N>-<name> (Issue番号がある場合) / <name> (Issue番号がない場合)"
    archive_dir: "YYYY-MM-DD-issue-<N>-<name> (Issue番号がある場合) / YYYY-MM-DD-<name> (Issue番号がない場合)"
    branch: |
      ブランチのプレフィックスは以下のルールで決定する:
      - Issue番号があり、そのIssueに "Bug" ラベルが付いている場合: `fix/issue-<N>-<name>`
      - 上記以外（Issueなし、またはBugラベルなし）: `feature/issue-<N>-<name>` / `feature/<name>`
      判定方法: `gh issue view <N> --json labels --jq '[.labels[].name]'` で "Bug" が含まれるか確認する
  commit_convention:
    prefixes:
      - "feat: 新機能・新しい振る舞いの追加"
      - "fix: バグ修正"
      - "refactor: 機能変更を伴わないコード整理"
      - "test: テストの追加・修正"
      - "chore: ビルド設定・ドキュメント・openspec 管理など"
    notes: |
      - プレフィックスは AI がコミット内容から判断して付ける。厳格なチェックは行わない。
      - コミットメッセージ本文（subject）は日本語で記述する。
      - タスクコミットの形式: `<prefix>: Task N - <タスクタイトル>`
  notes: |
    - `develop` ブランチは main からデプロイ設定が整ったタイミングでユーザーが手動で1回だけ作成する。
    - スキルが自動で develop を作成してはならない。
    - Issue番号はスキル呼び出し時にユーザーが渡す。渡されない場合は Issue なし扱いとする。
  rules:
    - trigger: "openspec-explore / openspec-propose (changeディレクトリ作成時)"
      description: |
        explore または propose で change ディレクトリを新規作成した直後、以下の手順でブランチを作成してチェックアウトすること。
        explore から propose に進む場合は、既に同 change のブランチが存在するためブランチ作成はスキップし、そのブランチで継続する。

        1. `git rev-parse --verify develop` で develop ブランチの存在を確認する
           - 存在しない場合は処理を中断し、「develop ブランチがまだ作成されていません。main でのデプロイ設定が完了したら `git checkout -b develop` で develop を作成してください。」とユーザーへ伝える
        2. `git checkout develop` でベースブランチに移動する
        2b. `git pull origin develop` で develop を最新状態に更新する
            - pull に失敗した場合は処理を中断し、エラー内容をユーザーへ伝える
        3. ブランチ名を決定する（naming.branch のルールに従う）
           - Issue番号がある場合: `gh issue view <N> --json labels --jq '[.labels[].name]'` で "Bug" ラベルの有無を確認する
             - "Bug" ラベルあり: `fix/issue-<N>-<name>`
             - "Bug" ラベルなし: `feature/issue-<N>-<name>`
           - Issue番号がない場合: `feature/<name>`
        4. 決定したブランチ名で `git checkout -b <branch>` を実行する
        5. ブランチ作成後、change ディレクトリの内容をコミットする
           - `git add openspec/changes/<change-dir>/`
           - `git commit -m "chore: <change-dir> の change を作成"`
        6. 作成したブランチ名をユーザーへ伝える
    - trigger: "openspec-apply-change (開始時)"
      description: |
        apply を開始する前に、change ディレクトリ内の未コミットファイルをすべてコミットすること。
        1. `git status` で未コミットの変更を確認する
        2. `openspec/changes/<change-dir>/` 配下に未コミットファイルがあれば以下を実行する
           - `git add openspec/changes/<change-dir>/`
           - `git commit -m "chore: <change-dir> の設計アーティファクトを追加"`
        3. 未コミットファイルがなければスキップしてそのまま実装へ進む
    - trigger: "openspec-apply-change (Task N 完了時)"
      description: |
        tasks.md の ## Task N（大項目）が完了したタイミングで実装コミットを行うこと。
        1. `git add -A` で変更をステージする
        2. `git commit -m "<prefix>: Task N - <タスクタイトル>"` でコミットする
           - prefix は commit_convention に従い AI が判断する
           - タスクタイトルは tasks.md の ## Task N の見出しテキストを使う
        - タスクが複数の小項目（N-1, N-2...）で構成される場合も、大項目完了時に1コミットにまとめる
    - trigger: "openspec-archive-change"
      description: |
        アーカイブ処理（mv コマンドによるディレクトリ移動）が完了した直後、以下の手順で PR を作成すること。
        0. アーカイブ前に未コミットの変更がないか確認する
           - `git status` で未コミットファイルがある場合は `git add -A && git commit -m "chore: アーカイブ前の残作業をコミット"` を実行する
        1. アーカイブした変更内容をステージング・コミットする
           - `git rm -r openspec/changes/<change-dir>/` で元ディレクトリの削除をステージする
           - `git add openspec/changes/archive/YYYY-MM-DD-<change-dir>/` でアーカイブ先をステージする
           - `git add openspec/specs/` でスペック同期の変更もステージする（同期を行った場合）
           - `git commit -m "chore: <change-dir> をアーカイブ"`
           - **注意**: `git add` のみでは mv による削除が追跡されない。必ず `git rm -r` で元ディレクトリを明示的に削除すること。
        2. フィーチャーブランチをリモートへプッシュする
           - `git push -u origin <branch>` （ブランチ名は naming.branch のルールで決定済みのもの）
        3. `gh api` で develop ブランチへの PR を作成する
           - `gh pr create` は zsh でのグロブ展開・Unicode・ヒアドキュメントのハングが起きやすいため、
             **Python の `json.dump` で JSON ファイルを生成し `gh api --input` で渡す**方式を使うこと。
             zsh のヒアドキュメント・グロブ展開を完全に迂回できる。
           - タイトル: change の proposal.md の内容をもとに日本語で簡潔に記述する（Unicode 特殊記号は問題ない）
           - **手順**（Python スクリプトとして一括実行すること）:
             ```python
             import json, subprocess, tempfile, os, textwrap

             repo = subprocess.check_output(
                 ['gh', 'repo', 'view', '--json', 'nameWithOwner', '--jq', '.nameWithOwner']
             ).decode().strip()

             pr_title = "タイトル"
             pr_body = textwrap.dedent("""
                 ## 概要

                 （概要テキスト）

                 Closes #<N>

                 ## 主な変更内容

                 - 変更1
                 - 変更2
             """).lstrip()
             # Issue番号がない場合は Closes #... 行を省略する

             payload = {
                 'title': pr_title,
                 'body': pr_body,
                 'head': '<branch>',
                 'base': 'develop'
             }

             # tempfile.mkstemp() で確実にユニークな一時ファイルを生成（macOS 互換）
             fd, tmpfile = tempfile.mkstemp(suffix='.json')
             try:
                 with os.fdopen(fd, 'w', encoding='utf-8') as f:
                     json.dump(payload, f, ensure_ascii=False)
                 result = subprocess.check_output(
                     ['gh', 'api', f'repos/{repo}/pulls', '--input', tmpfile]
                 )
             finally:
                 os.remove(tmpfile)  # 成功・失敗問わず必ず削除

             data = json.loads(result)
             pr_url = data['html_url']
             pr_number = data['number']
             print(f"PR 作成: {pr_url}")
             ```
           - Issue番号がある場合: ラベルを取得し PR 番号経由で設定する
             ```sh
             labels=$(gh issue view <N> --json labels --jq '[.labels[].name] | join(",")' 2>/dev/null)
             if [ -n "$labels" ]; then
               IFS=',' read -rA label_array <<< "$labels"
               for label in "${label_array[@]}"; do
                 gh api "repos/$repo/issues/$pr_number/labels" \
                   --method POST -f "labels[]=$label"
               done
             fi
             ```
           - **PR 作成後、または結果が不明瞭だった場合は、必ず以下で確認すること。**
             再試行する前にこの確認を行わないと、PR が二重に作成されるリスクがある。
             ```sh
             gh pr list --head <branch>
             ```
             PR が既に存在すれば URL が表示されるのでそれをユーザーへ伝える。
             存在しない場合のみ再実行する。
        4. 作成した PR の URL をユーザーへ伝える
