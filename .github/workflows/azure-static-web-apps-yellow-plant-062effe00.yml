name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: ビルドとデプロイ
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存パッケージのインストール
        run: npm ci

      - name: テスト実行
        run: npm test

      - name: ビルド
        run: npm run build
        env:
          VITE_COMMENTS_URL: ${{ secrets.VITE_COMMENTS_URL }}

      - name: node_modules を削除（デプロイ対象から除外）
        run: rm -rf node_modules

      - name: Azure Static Web Apps へデプロイ
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_PLANT_062EFFE00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          output_location: ""
          skip_app_build: true
          production_branch: "main"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: プレビュー環境のクローズ
    steps:
      - name: プレビュー環境を削除
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_PLANT_062EFFE00 }}
          action: "close"
          app_location: "/"
