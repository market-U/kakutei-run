<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>確定申告ラン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP&display=swap" rel="stylesheet">  </head>
  <body class="bg-black flex justify-center items-center w-screen h-svh overflow-hidden">
    <div id="game-container" class="w-full h-full"></div>

    <!-- HUD オーバーレイ（ゲームプレイ中のみ表示） -->
    <div id="hud-overlay" class="hidden fixed top-0 left-0 right-0 px-4 py-2.5 justify-between items-center pointer-events-none z-10">
      <span id="hud-receipts" class="text-white text-lg [text-shadow:0_0_4px_#000,0_0_4px_#000]">レシート: 0 / 0</span>
      <span id="hud-distance" class="text-white text-lg [text-shadow:0_0_4px_#000,0_0_4px_#000]">距離: 0m</span>
    </div>

    <!-- タイトル画面 -->
    <div id="title-screen" class="hidden fixed inset-0 bg-yellow-100/100 z-[100] overflow-y-auto justify-center">
      <div class="flex flex-row">
        <div class="flex flex-col landscape:flex-row items-center justify-center gap-3 px-6 py-8 landscape:py-4 landscape:gap-2 min-h-full w-full">
          <!-- 左カラム：ロゴエリア -->
          <div class="flex flex-col items-center justify-center landscape:flex-4 min-w-[320px]">
            <img
              id="title-logo"
              src="/assets/ui/title_logo.png"
              alt="確定RUN"
              class="max-w-[320px] w-full"
            />
            <span id="app-version" class="text-md text-black/100 text-right"></span>
          </div>
          <!-- 右カラム：操作エリア -->
          <div class="flex flex-col items-center justify-center gap-4 landscape:flex-3 min-w-[240px]">
            <p class="hidden text-black text-base text-center"><i class="fa-solid fa-arrow-down"></i>スタート</p>
            <div id="difficulty-buttons" class="flex flex-col gap-3 items-center w-full max-w-xs"></div>
            <!-- <span id="title-hint" class="text-sm text-white/70 text-center">スペース or タップ: ジャンプ（長押しでチャージ）</span> -->
            <img
              id="kakuko"
              src="/assets/ui/kakuko.png"
              alt="カクコさん"
              class="max-w-[320px] w-full"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" class="hidden fixed inset-0 bg-zinc-700/85 z-[100] overflow-y-auto justify-center">
      <div class="flex flex-row">
        <div class="flex flex-col landscape:flex-row items-center justify-center gap-6 px-8 py-8 landscape:py-4 landscape:gap-2 min-h-full w-full">
          <!-- 左カラム：結果エリア -->
          <div class="flex flex-col items-center justify-center gap-3 landscape:flex-5 min-w-[320px]">
            <div class="flex flex-col gap-0">
              <div id="result-crown" class="hidden text-center"><i class="fa-solid fa-crown text-yellow-400/100"></i></div>
              <div id="result-difficulty" class="text-2xl text-center [text-shadow:2px_2px_6px_#000]"></div>
              <div id="result-title" class="text-5xl text-center [text-shadow:2px_2px_6px_#000]"></div>
            </div>
            <div id="result-score" class="text-2xl text-white text-center"></div>
            <div id="result-count" class="hidden text-lg text-white/70 text-center"></div>
            <button id="share-btn" class="btn bg-teal-400 hover:bg-teal-300 text-white border-none mt-2"><i class="fa-solid fa-share-nodes"></i>
結果をシェア</button>
          </div>
          <!-- 右カラム：リトライエリア -->
          <div class="flex flex-col items-center justify-center gap-4 landscape:flex-3 min-w-[240px]">
            <p class="text-white/70 text-base text-center">リトライ</p>
            <div id="retry-buttons" class="flex flex-col gap-3 items-center w-full max-w-xs"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- コメントトグルボタン（ゲームプレイ中のみ表示） -->
    <button
      id="comment-toggle-btn"
      title="コメント表示切替"
      class="hidden fixed top-2 right-14 w-10 h-10 bg-black/50 text-white border border-white/30 rounded-lg text-lg z-[200] items-center justify-center"
    >💬</button>

    <!-- ポーズボタン（ゲームプレイ中のみ表示） -->
    <button
      id="pause-btn"
      title="ポーズ"
      class="hidden fixed top-2 right-2 w-10 h-10 bg-black/50 text-white border border-white/30 rounded-lg text-lg z-[200] items-center justify-center"
    >⏸</button>

    <!-- ポーズオーバーレイ -->
    <div id="pause-overlay" class="hidden fixed inset-0 bg-black/70 flex-col justify-center items-center gap-4 z-[150] cursor-pointer">
      <p class="text-5xl text-white">⏸ PAUSE</p>
      <small class="text-lg text-white/70">タップして再開</small>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
