<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>確定申告ラン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bg-black flex justify-center items-center w-screen h-svh overflow-hidden">
    <div id="game-container" class="w-full h-full"></div>

    <!-- HUD オーバーレイ（ゲームプレイ中のみ表示） -->
    <div id="hud-overlay" class="hidden fixed top-0 left-0 right-0 px-4 py-2.5 justify-between items-center pointer-events-none z-10">
      <span id="hud-receipts" class="text-white text-lg [text-shadow:0_0_4px_#000,0_0_4px_#000]">レシート: 0 / 0</span>
      <span id="hud-distance" class="text-white text-lg [text-shadow:0_0_4px_#000,0_0_4px_#000]">距離: 0m</span>
    </div>

    <!-- タイトル画面 -->
    <div id="title-screen" class="hidden fixed inset-0 bg-sky-400 z-[100] overflow-y-auto">
      <div class="min-h-full flex flex-col landscape:flex-row items-center justify-center gap-6 px-6 py-8 landscape:py-4 landscape:gap-0">
        <!-- 左カラム：ロゴエリア -->
        <div class="flex flex-col items-center gap-3 landscape:flex-1 landscape:justify-center">
          <img
            id="title-logo"
            src="/assets/ui/title_logo.png"
            alt="確定申告ラン"
            class="max-w-[320px] w-full landscape:max-w-[280px] rounded-lg"
          />
        </div>
        <!-- 右カラム：操作エリア -->
        <div class="flex flex-col items-center gap-4 landscape:flex-1 landscape:justify-center">
          <p class="text-white text-base">難易度を選んでスタート！</p>
          <div id="difficulty-buttons" class="flex flex-col gap-3 items-center w-full max-w-xs"></div>
          <span id="title-hint" class="text-sm text-white/70 text-center">スペース or タップ: ジャンプ（長押しでチャージ）</span>
          <span id="app-version" class="text-xs text-white/50"></span>
        </div>
      </div>
    </div>

    <!-- リザルト画面 -->
    <div id="result-screen" class="hidden fixed inset-0 bg-black/85 z-[100] overflow-y-auto">
      <div class="min-h-full flex flex-col landscape:flex-row items-center justify-center gap-5 px-6 py-8 landscape:py-4 landscape:gap-0">
        <!-- 左カラム：結果エリア -->
        <div class="flex flex-col items-center gap-3 landscape:flex-1 landscape:justify-center">
          <div id="result-title" class="text-5xl [text-shadow:2px_2px_6px_#000]"></div>
          <div id="result-score" class="text-2xl text-white"></div>
          <div id="result-count" class="text-lg text-white/70"></div>
          <div id="result-difficulty" class="hidden text-base text-white/60"></div>
          <button id="share-btn" class="btn bg-sky-500 hover:bg-sky-400 text-white border-none mt-2">📱 シェア</button>
        </div>
        <!-- 右カラム：リトライエリア -->
        <div class="flex flex-col items-center gap-3 landscape:flex-1 landscape:justify-center">
          <p class="text-white/70 text-base">難易度を選んでリトライ</p>
          <div id="retry-buttons" class="flex flex-col gap-3 items-center w-full max-w-xs"></div>
        </div>
      </div>
    </div>

    <!-- ポーズボタン（ゲームプレイ中のみ表示） -->
    <button
      id="pause-btn"
      title="ポーズ"
      class="hidden fixed top-2 right-2 w-10 h-10 bg-black/50 text-white border border-white/30 rounded-lg text-lg z-[200] items-center justify-center"
    >⏸</button>

    <!-- ポーズオーバーレイ -->
    <div id="pause-overlay" class="hidden fixed inset-0 bg-black/70 flex-col justify-center items-center gap-4 z-[150] cursor-pointer">
      <p class="text-5xl text-white">⏸ PAUSE</p>
      <small class="text-lg text-white/70">タップして再開</small>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
